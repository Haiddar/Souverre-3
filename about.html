<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>soûverre — About</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0ece4;
      --rust: #8b3a1e;
      --text: #3a2a1e;
      --text-light: #6b4e3a;
      --mono: 'Optima', 'Segoe UI', Candara, Calibri, Arial, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    .header {
      padding: 3rem 3rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-logo { display: flex; align-items: center; }
    .brand-logo { height: 1.6rem; width: auto; }
    .header-nav { display: flex; gap: 2rem; }

    .header-nav a {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      transition: color 0.2s;
    }

    .header-nav a:hover { color: var(--rust); }
    .header-nav a.active { color: var(--rust); }

    /* ── INTRO HANDWRITING ── */
    .intro-section {
      padding: 4rem 3rem 3rem;
      display: flex;
      justify-content: center;
    }

    .intro-handwriting {
      max-width: 220px;
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── COLLAGE WRAPPER ── */
    .collage {
      width: min(520px, 90vw);
      margin: 0 auto;
      padding: 0 0 2rem;
    }

    /* ── TOP GROUP: mountain + jasper + rock ── */
    .collage-top {
      position: relative;
      width: 100%;
      /* Height driven by the mountain image */
    }

    .collage-top .mountain {
      position: relative;
      width: 45%;
      transform: rotate(-1deg);
      z-index: 2;
    }

    .collage-top .mountain img {
      width: 100%;
      height: auto;
      display: block;
    }

    .collage-top .jasper {
      position: absolute;
      bottom: 12%;
      left: 32%;
      width: 50%;
      transform: rotate(-4deg);
      z-index: 3;
    }

    .collage-top .jasper img {
      width: 100%;
      height: auto;
      display: block;
    }

    .collage-top .rock {
      position: absolute;
      top: -2%;
      right: 2%;
      width: 29%;
      z-index: 4;
    }

    .collage-top .rock img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── BOTTOM GROUP: stamps + chairs ── */
    .collage-bottom {
      position: relative;
      width: 100%;
      margin-top: 1.5rem;
      min-height: 200px;
    }

    .collage-bottom .stamps {
      position: absolute;
      bottom: 0;
      left: 20%;
      width: 28%;
      z-index: 4;
    }

    .collage-bottom .stamps img {
      width: 100%;
      height: auto;
      display: block;
    }

    .collage-bottom .chairs {
      position: relative;
      width: 70%;
      margin-left: auto;
      transform: rotate(-1deg);
      z-index: 5;
    }

    .collage-bottom .chairs img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── BG IMAGE SECTION ── */
    .bg-image-section {
      position: relative;
      margin-top: 3rem;
    }

    .bg-image-section img {
      display: block;
      width: 100%;
      height: auto;
    }

    .bg-image-section::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(240, 236, 228, 0.4);
    }

    /* ── FOOTER ── */
    footer {
      padding: 1rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #545C47;
    }

    .footer-text {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      color: #d9d3c7;
    }

    .footer-icons {
      display: flex;
      gap: 1.25rem;
      align-items: center;
    }

    .footer-icons a {
      color: #d9d3c7;
      text-decoration: none;
      display: flex;
      align-items: center;
    }

    .footer-icons a:hover { color: #ffffff; }

    .footer-icons svg {
      width: 18px;
      height: 18px;
    }

    /* ── FADE IN ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header { animation: fadeUp 0.6s ease both; }
    .intro-section { animation: fadeUp 0.6s ease 0.08s both; }
    .collage { animation: fadeUp 0.7s ease 0.16s both; }
    .bg-image-section { animation: fadeUp 0.7s ease 0.24s both; }

    /* ── DESKTOP ── */
    @media (min-width: 769px) {
      .collage {
        width: min(713px, 80vw);
      }

      .collage-top .mountain {
        width: 57%;
      }

      .collage-top .jasper {
        width: 60.7%;
        left: 28%;
        bottom: 15%;
      }

      .collage-top .rock {
        top: -2%;
        right: 0;
        width: 38%;
      }

      .collage-bottom .stamps {
        width: 37.1%;
        left: 0;
        bottom: 15%;
      }

      .collage-bottom .chairs {
        width: 76%;
      }

      .collage-bottom {
        margin-top: 1.5rem;
      }

      .intro-handwriting {
        max-width: 322px;
      }

      .footer-text {
        font-size: 14px;
      }
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .header {
        padding: 1.5rem 1.25rem 0;
      }

      .brand-logo { height: 1.1rem; }

      .header-nav { gap: 1.25rem; }

      .intro-section {
        padding: 3rem 1.25rem 2rem;
      }

      .intro-handwriting {
        max-width: 220px;
      }

      .collage {
        width: 92vw;
      }

      .collage-bottom {
        margin-top: 1rem;
      }

      .bg-image-section {
        margin-top: 2rem;
      }

      footer {
        padding: 0.75rem 1.25rem;
      }

      .footer-text { font-size: 11px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-logo">
      <a href="index.html"><img src="Images/Souverre Logo.png" alt="soûverre" class="brand-logo" /></a>
    </div>
    <nav class="header-nav">
      <a href="about.html" class="active">About</a>
      <a href="scent-trails.html">Scent Trails</a>
    </nav>
  </header>

  <!-- INTRO HANDWRITING -->
  <section class="intro-section">
    <img src="Images/about-image-1.png" alt="Rooted in the landscape of the True North where weather moves slowly and seasons leave long traces, we observe the dryness of earth and the slow shift of light, preserving these moments before they pass." class="intro-handwriting" />
  </section>

  <!-- COLLAGE -->
  <div class="collage">

    <!-- Top group: mountain + jasper + rock -->
    <div class="collage-top">
      <div class="mountain">
        <img src="Images/about-image-2.png" alt="Mountain landscape — Banff" />
      </div>
      <div class="jasper">
        <img src="Images/about-image-3.png" alt="Jasper landscape" />
      </div>
      <div class="rock">
        <img src="Images/about-image-4.png" alt="" />
      </div>
    </div>

    <!-- Bottom group: stamps + chairs -->
    <div class="collage-bottom">
      <div class="stamps">
        <img src="Images/about-image-5.png" alt="" />
      </div>
      <div class="chairs">
        <img src="Images/about-image-6.png" alt="Chairs — Jasper" />
      </div>
    </div>

  </div>

  <!-- BACKGROUND IMAGE -->
  <div class="bg-image-section">
    <img src="Images/Image-BG.png" alt="" />
  </div>

  <!-- FOOTER -->
  <footer>
    <span class="footer-text">We document the scent of the wilderness.</span>
    <div class="footer-icons">
      <a href="#" aria-label="Email">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2" />
          <path d="M22 4L12 13L2 4" />
        </svg>
      </a>
      <a href="https://www.instagram.com/souverre.ca/" aria-label="Instagram" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" />
          <circle cx="12" cy="12" r="5" />
          <circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none" />
        </svg>
      </a>
    </div>
  </footer>

</body>
</html>
